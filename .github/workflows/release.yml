name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules (sharp, ffmpeg-static)
        run: |
          npm rebuild sharp ffmpeg-static --build-from-source
        shell: bash

      - name: Build
        run: npm run build

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
