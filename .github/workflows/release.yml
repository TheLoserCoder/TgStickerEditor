name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PUBLISH_STRATEGY: always

jobs:
  release:
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm rebuild sharp --platform=linux --arch=x64
          npm rebuild @img/sharp-linux-x64 --platform=linux --arch=x64

      - name: Rebuild native modules for Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm rebuild sharp --platform=win32 --arch=x64
          npm rebuild @img/sharp-win32-x64 --platform=win32 --arch=x64

      - name: Build
        run: npm run build

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --config electron-builder.json --publish ${{ env.PUBLISH_STRATEGY }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --config electron-builder.json --publish ${{ env.PUBLISH_STRATEGY }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
